<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050709"/><stop offset="100%" stop-color="#080C14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2546F0"/><stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="screen-l" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080D1A"/><stop offset="100%" stop-color="#0B1222"/>
    </linearGradient>
    <linearGradient id="screen-r" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060B16"/><stop offset="100%" stop-color="#0A1020"/>
    </linearGradient>
    <linearGradient id="fold-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#2546F0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="hinge-glow"><feGaussianBlur stdDeviation="3"/></filter>
    <clipPath id="left-screen"><rect x="165" y="90" width="195" height="320" rx="3"/></clipPath>
    <clipPath id="right-screen"><rect x="440" y="90" width="195" height="320" rx="3"/></clipPath>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Ambient glow behind device -->
  <ellipse cx="400" cy="250" rx="280" ry="200" fill="#22D3EE" opacity="0.04" filter="url(#soft)"/>
  <ellipse cx="400" cy="250" rx="180" ry="120" fill="#2546F0" opacity="0.05" filter="url(#soft)"/>

  <!-- ── LEFT PANEL ── -->
  <!-- Frame -->
  <rect x="155" y="80" width="215" height="340" rx="18" fill="#0D1118" stroke="#1E2840" stroke-width="2"/>
  <!-- Screen area -->
  <rect x="165" y="90" width="195" height="320" rx="3" fill="url(#screen-l)"/>

  <!-- Left screen content: app grid -->
  <g clip-path="url(#left-screen)">
    <!-- Status bar -->
    <rect x="165" y="90" width="195" height="22" fill="#060A14"/>
    <circle cx="175" cy="101" r="3" fill="#22D3EE" opacity="0.5"/>
    <rect x="182" y="98" width="40" height="6" rx="3" fill="#1A2540" opacity="0.8"/>
    <text x="348" y="104" font-family="monospace" font-size="7" fill="#6B7A99" text-anchor="end">9:41</text>

    <!-- App windows on left panel -->
    <rect x="170" y="120" width="185" height="110" rx="8" fill="#0A1020" stroke="#1A2848" stroke-width="1"/>
    <text x="178" y="137" font-family="monospace" font-size="8" fill="#22D3EE" font-weight="bold">Messages</text>
    <rect x="178" y="145" width="80" height="6" rx="3" fill="#1A2540"/>
    <rect x="178" y="157" width="110" height="6" rx="3" fill="#1A2540"/>
    <rect x="178" y="169" width="90" height="6" rx="3" fill="#1A2540"/>
    <rect x="178" y="181" width="60" height="6" rx="3" fill="#1A2540"/>
    <rect x="178" y="193" width="100" height="6" rx="3" fill="#1A2540"/>
    <rect x="178" y="205" width="70" height="6" rx="3" fill="#1A2540"/>

    <rect x="170" y="240" width="85" height="80" rx="8" fill="#0A1020" stroke="#1A2848" stroke-width="1"/>
    <text x="178" y="256" font-family="monospace" font-size="8" fill="#2546F0" font-weight="bold">Maps</text>
    <!-- Simple map grid -->
    <g stroke="#1A2848" stroke-width="0.5">
      <line x1="170" y1="265" x2="255" y2="265"/><line x1="170" y1="280" x2="255" y2="280"/>
      <line x1="200" y1="240" x2="200" y2="320"/><line x1="225" y1="240" x2="225" y2="320"/>
    </g>
    <circle cx="213" cy="273" r="4" fill="#22D3EE" opacity="0.8"/>

    <rect x="265" y="240" width="90" height="80" rx="8" fill="#0A1020" stroke="#1A2848" stroke-width="1"/>
    <text x="273" y="256" font-family="monospace" font-size="8" fill="#22D3EE" font-weight="bold">Notes</text>
    <rect x="273" y="264" width="68" height="4" rx="2" fill="#1A2540"/>
    <rect x="273" y="272" width="55" height="4" rx="2" fill="#1A2540"/>
    <rect x="273" y="280" width="62" height="4" rx="2" fill="#1A2540"/>
    <rect x="273" y="288" width="45" height="4" rx="2" fill="#1A2540"/>

    <!-- Dock bar -->
    <rect x="175" y="375" width="175" height="26" rx="13" fill="#0F1828" stroke="#1A2848" stroke-width="1"/>
    <circle cx="200" cy="388" r="8" fill="#2546F0" opacity="0.6"/>
    <circle cx="228" cy="388" r="8" fill="#22D3EE" opacity="0.5"/>
    <circle cx="256" cy="388" r="8" fill="#2546F0" opacity="0.4"/>
    <circle cx="284" cy="388" r="8" fill="#22D3EE" opacity="0.4"/>
    <circle cx="312" cy="388" r="8" fill="#2546F0" opacity="0.4"/>
    <circle cx="340" cy="388" r="8" fill="#22D3EE" opacity="0.4"/>
  </g>

  <!-- ── HINGE / FOLD LINE ── -->
  <!-- Hinge body -->
  <rect x="370" y="80" width="60" height="340" rx="6" fill="#0C1018" stroke="#1A2030" stroke-width="1"/>
  <!-- Fold glow line -->
  <rect x="398" y="80" width="4" height="340" rx="2" fill="url(#fold-glow)"/>
  <rect x="398" y="80" width="4" height="340" rx="2" fill="url(#fold-glow)" filter="url(#hinge-glow)" opacity="0.8"/>
  <!-- Hinge mechanism dots -->
  <g fill="#1E2A40">
    <circle cx="400" cy="140" r="5"/><circle cx="400" cy="180" r="5"/>
    <circle cx="400" cy="250" r="5"/><circle cx="400" cy="320" r="5"/>
    <circle cx="400" cy="360" r="5"/>
  </g>
  <g fill="#22D3EE" opacity="0.5">
    <circle cx="400" cy="140" r="2"/><circle cx="400" cy="250" r="2"/><circle cx="400" cy="360" r="2"/>
  </g>
  <!-- "Zero-Gap" label -->
  <text x="400" y="208" font-family="monospace" font-size="6.5" fill="#22D3EE" text-anchor="middle" opacity="0.7" transform="rotate(-90 400 208)">ZERO-GAP HINGE 3.0</text>

  <!-- ── RIGHT PANEL ── -->
  <rect x="430" y="80" width="215" height="340" rx="18" fill="#0D1118" stroke="#1E2840" stroke-width="2"/>
  <rect x="440" y="90" width="195" height="320" rx="3" fill="url(#screen-r)"/>

  <g clip-path="url(#right-screen)">
    <!-- Status bar -->
    <rect x="440" y="90" width="195" height="22" fill="#060A14"/>
    <text x="448" y="104" font-family="monospace" font-size="7" fill="#6B7A99">9:41</text>
    <circle cx="625" cy="101" r="3" fill="#22D3EE" opacity="0.5"/>

    <!-- Main app: email/browser -->
    <rect x="445" y="120" width="185" height="260" rx="8" fill="#09111E" stroke="#1A2848" stroke-width="1"/>
    <!-- Browser chrome -->
    <rect x="445" y="120" width="185" height="28" rx="8" fill="#0C1522"/>
    <rect x="453" y="128" width="130" height="12" rx="6" fill="#111A2E"/>
    <text x="518" y="137" font-family="monospace" font-size="7" fill="#6B7A99" text-anchor="middle">techzynq.com</text>
    <circle cx="590" cy="134" r="5" fill="#22D3EE" opacity="0.2"/>
    <circle cx="607" cy="134" r="5" fill="#2546F0" opacity="0.2"/>
    <circle cx="624" cy="134" r="5" fill="#22D3EE" opacity="0.15"/>

    <!-- "Website" content in browser -->
    <rect x="450" y="153" width="175" height="12" rx="3" fill="#1A2540" opacity="0.7"/>
    <rect x="450" y="170" width="140" height="8" rx="3" fill="#1A2540" opacity="0.5"/>
    <rect x="450" y="183" width="155" height="8" rx="3" fill="#1A2540" opacity="0.4"/>
    <rect x="450" y="196" width="120" height="8" rx="3" fill="#1A2540" opacity="0.4"/>
    <rect x="450" y="214" width="175" height="55" rx="5" fill="#0F1828" stroke="#1A2848" stroke-width="0.5"/>
    <text x="537" y="245" font-family="monospace" font-size="8" fill="#22D3EE" text-anchor="middle" opacity="0.6">— article image —</text>
    <rect x="450" y="275" width="95" height="7" rx="3" fill="#1A2540" opacity="0.5"/>
    <rect x="450" y="287" width="145" height="7" rx="3" fill="#1A2540" opacity="0.4"/>
    <rect x="450" y="299" width="120" height="7" rx="3" fill="#1A2540" opacity="0.4"/>
    <rect x="450" y="311" width="100" height="7" rx="3" fill="#1A2540" opacity="0.3"/>
    <rect x="450" y="323" width="135" height="7" rx="3" fill="#1A2540" opacity="0.3"/>
    <rect x="450" y="335" width="80" height="7" rx="3" fill="#1A2540" opacity="0.3"/>
    <rect x="450" y="351" width="50" height="16" rx="8" fill="#2546F0" opacity="0.6"/>
    <text x="475" y="362" font-family="monospace" font-size="7" fill="#fff" text-anchor="middle">Read</text>

    <!-- Navigation dots at bottom -->
    <g fill="#22D3EE" opacity="0.5">
      <circle cx="525" cy="388" r="4"/><circle cx="540" cy="388" r="4"/><circle cx="555" cy="388" r="4"/>
    </g>
  </g>

  <!-- Spec callout badges -->
  <g>
    <rect x="30" y="140" width="118" height="34" rx="7" fill="#0A1020" stroke="#2546F0" stroke-width="1" opacity="0.9"/>
    <text x="89" y="155" font-family="monospace" font-size="8" fill="#2546F0" text-anchor="middle" font-weight="bold">4500 mAh</text>
    <text x="89" y="167" font-family="monospace" font-size="7" fill="#6B7A99" text-anchor="middle">45W fast charge</text>

    <rect x="30" y="186" width="118" height="34" rx="7" fill="#0A1020" stroke="#22D3EE" stroke-width="1" opacity="0.9"/>
    <text x="89" y="201" font-family="monospace" font-size="8" fill="#22D3EE" text-anchor="middle" font-weight="bold">Android 15</text>
    <text x="89" y="213" font-family="monospace" font-size="7" fill="#6B7A99" text-anchor="middle">3-app multitasking</text>

    <rect x="652" y="140" width="118" height="34" rx="7" fill="#0A1020" stroke="#22D3EE" stroke-width="1" opacity="0.9"/>
    <text x="711" y="155" font-family="monospace" font-size="8" fill="#22D3EE" text-anchor="middle" font-weight="bold">Zero Crease™</text>
    <text x="711" y="167" font-family="monospace" font-size="7" fill="#6B7A99" text-anchor="middle">Hinge Gen 3.0</text>

    <rect x="652" y="186" width="118" height="34" rx="7" fill="#0A1020" stroke="#2546F0" stroke-width="1" opacity="0.9"/>
    <text x="711" y="201" font-family="monospace" font-size="8" fill="#2546F0" text-anchor="middle" font-weight="bold">ZAR 38,000</text>
    <text x="711" y="213" font-family="monospace" font-size="7" fill="#6B7A99" text-anchor="middle">USD 1,999</text>
  </g>

  <!-- Drag-and-drop arrow between panels -->
  <path d="M330 270 Q340 255 370 255 Q400 255 430 255 Q460 255 470 270" stroke="#22D3EE" stroke-width="1" fill="none" stroke-dasharray="4 3" opacity="0.4"/>
  <polygon points="466,267 475,272 467,278" fill="#22D3EE" opacity="0.4"/>

  <!-- Galaxy Z Fold 7 label -->
  <rect x="300" y="440" width="200" height="36" rx="8" fill="#080C18" stroke="url(#accent)" stroke-width="1"/>
  <text x="400" y="456" font-family="sans-serif" font-size="11" fill="#E4E8F1" text-anchor="middle" font-weight="bold">Galaxy Z Fold 7</text>
  <text x="400" y="469" font-family="monospace" font-size="8" fill="#6B7A99" text-anchor="middle">Reviewed · 2-week daily driver</text>
</svg>
