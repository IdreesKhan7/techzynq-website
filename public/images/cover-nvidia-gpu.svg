<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040608"/>
      <stop offset="100%" stop-color="#070C10"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2546F0"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="green-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#00E676"/>
    </linearGradient>
    <linearGradient id="chip-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#131B2E"/>
      <stop offset="100%" stop-color="#0C1220"/>
    </linearGradient>
    <radialGradient id="core-heat" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#2546F0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2546F0" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="blur"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- PCB board background -->
  <rect x="100" y="80" width="600" height="340" rx="12" fill="#060A10" stroke="#0F1A28" stroke-width="2"/>

  <!-- PCB trace lines -->
  <g stroke="#0E2030" stroke-width="1">
    <line x1="100" y1="150" x2="700" y2="150"/><line x1="100" y1="350" x2="700" y2="350"/>
    <line x1="160" y1="80" x2="160" y2="420"/><line x1="640" y1="80" x2="640" y2="420"/>
    <!-- Circuit traces -->
    <path d="M100 200 L150 200 L150 220 L200 220" fill="none"/>
    <path d="M100 300 L150 300 L150 280 L200 280" fill="none"/>
    <path d="M700 200 L650 200 L650 220 L600 220" fill="none"/>
    <path d="M700 300 L650 300 L650 280 L600 280" fill="none"/>
  </g>
  <!-- Glowing PCB traces -->
  <g stroke="#22D3EE" stroke-width="1" opacity="0.12">
    <path d="M100 200 L150 200 L150 220 L200 220" fill="none"/>
    <path d="M100 300 L150 300 L150 280 L200 280" fill="none"/>
    <path d="M700 200 L650 200 L650 220 L600 220" fill="none"/>
    <path d="M700 300 L650 300 L650 280 L600 280" fill="none"/>
  </g>

  <!-- Memory modules (left) -->
  <g>
    <rect x="125" y="120" width="50" height="260" rx="4" fill="#0A1018" stroke="#1A2840" stroke-width="1"/>
    <rect x="127" y="122" width="46" height="256" rx="3" fill="#0D141E" stroke="#1C2A3A" stroke-width="0.5"/>
    <!-- HBM4 stack lines -->
    <g stroke="#22D3EE" stroke-width="0.5" opacity="0.3">
      <line x1="125" y1="152" x2="175" y2="152"/><line x1="125" y1="182" x2="175" y2="182"/>
      <line x1="125" y1="212" x2="175" y2="212"/><line x1="125" y1="242" x2="175" y2="242"/>
      <line x1="125" y1="272" x2="175" y2="272"/><line x1="125" y1="302" x2="175" y2="302"/>
      <line x1="125" y1="332" x2="175" y2="332"/>
    </g>
    <text x="150" y="254" font-family="monospace" font-size="7" fill="#22D3EE" text-anchor="middle" opacity="0.7" transform="rotate(-90 150 254)">HBM4 · 288GB</text>
  </g>

  <!-- Memory modules (right) -->
  <g>
    <rect x="625" y="120" width="50" height="260" rx="4" fill="#0A1018" stroke="#1A2840" stroke-width="1"/>
    <rect x="627" y="122" width="46" height="256" rx="3" fill="#0D141E" stroke="#1C2A3A" stroke-width="0.5"/>
    <g stroke="#22D3EE" stroke-width="0.5" opacity="0.3">
      <line x1="625" y1="152" x2="675" y2="152"/><line x1="625" y1="182" x2="675" y2="182"/>
      <line x1="625" y1="212" x2="675" y2="212"/><line x1="625" y1="242" x2="675" y2="242"/>
      <line x1="625" y1="272" x2="675" y2="272"/><line x1="625" y1="302" x2="675" y2="302"/>
      <line x1="625" y1="332" x2="675" y2="332"/>
    </g>
    <text x="650" y="254" font-family="monospace" font-size="7" fill="#22D3EE" text-anchor="middle" opacity="0.7" transform="rotate(90 650 254)">HBM4 · 288GB</text>
  </g>

  <!-- Main chip die -->
  <rect x="200" y="110" width="400" height="280" rx="8" fill="url(#chip-body)" stroke="#1E2E50" stroke-width="2"/>

  <!-- Heat spread glow -->
  <rect x="200" y="110" width="400" height="280" rx="8" fill="url(#core-heat)"/>

  <!-- Chip internal core grid -->
  <g stroke="#1A2540" stroke-width="0.5" opacity="0.8">
    <!-- Columns -->
    <line x1="240" y1="110" x2="240" y2="390"/><line x1="280" y1="110" x2="280" y2="390"/>
    <line x1="320" y1="110" x2="320" y2="390"/><line x1="360" y1="110" x2="360" y2="390"/>
    <line x1="400" y1="110" x2="400" y2="390"/><line x1="440" y1="110" x2="440" y2="390"/>
    <line x1="480" y1="110" x2="480" y2="390"/><line x1="520" y1="110" x2="520" y2="390"/>
    <line x1="560" y1="110" x2="560" y2="390"/>
    <!-- Rows -->
    <line x1="200" y1="150" x2="600" y2="150"/><line x1="200" y1="190" x2="600" y2="190"/>
    <line x1="200" y1="230" x2="600" y2="230"/><line x1="200" y1="270" x2="600" y2="270"/>
    <line x1="200" y1="310" x2="600" y2="310"/><line x1="200" y1="350" x2="600" y2="350"/>
  </g>

  <!-- SM (Streaming Multiprocessor) blocks -->
  <!-- Row 1 -->
  <g fill="#0F1A2C" stroke="#223060" stroke-width="1">
    <rect x="208" y="118" width="28" height="28" rx="3"/>
    <rect x="242" y="118" width="28" height="28" rx="3"/>
    <rect x="276" y="118" width="28" height="28" rx="3"/>
    <rect x="310" y="118" width="28" height="28" rx="3"/>
    <rect x="344" y="118" width="28" height="28" rx="3"/>
    <rect x="378" y="118" width="28" height="28" rx="3"/>
    <rect x="412" y="118" width="28" height="28" rx="3"/>
    <rect x="446" y="118" width="28" height="28" rx="3"/>
    <rect x="480" y="118" width="28" height="28" rx="3"/>
    <rect x="514" y="118" width="28" height="28" rx="3"/>
    <rect x="548" y="118" width="28" height="28" rx="3"/>
    <rect x="564" y="118" width="28" height="28" rx="3"/>
  </g>
  <!-- Active SM glows (highlight some) -->
  <g fill="#22D3EE" opacity="0.15">
    <rect x="208" y="118" width="28" height="28" rx="3"/>
    <rect x="310" y="118" width="28" height="28" rx="3"/>
    <rect x="446" y="118" width="28" height="28" rx="3"/>
    <rect x="548" y="118" width="28" height="28" rx="3"/>
  </g>

  <!-- Row 2-4 SM blocks (simplified) -->
  <g fill="#0F1A2C" stroke="#1A2848" stroke-width="0.8">
    <rect x="208" y="158" width="28" height="28" rx="3"/><rect x="242" y="158" width="28" height="28" rx="3"/>
    <rect x="276" y="158" width="28" height="28" rx="3"/><rect x="310" y="158" width="28" height="28" rx="3"/>
    <rect x="344" y="158" width="28" height="28" rx="3"/><rect x="378" y="158" width="28" height="28" rx="3"/>
    <rect x="412" y="158" width="28" height="28" rx="3"/><rect x="446" y="158" width="28" height="28" rx="3"/>
    <rect x="480" y="158" width="28" height="28" rx="3"/><rect x="514" y="158" width="28" height="28" rx="3"/>
    <rect x="548" y="158" width="28" height="28" rx="3"/>

    <rect x="208" y="198" width="28" height="28" rx="3"/><rect x="242" y="198" width="28" height="28" rx="3"/>
    <rect x="276" y="198" width="28" height="28" rx="3"/><rect x="310" y="198" width="28" height="28" rx="3"/>
    <rect x="344" y="198" width="28" height="28" rx="3"/><rect x="378" y="198" width="28" height="28" rx="3"/>
    <rect x="412" y="198" width="28" height="28" rx="3"/><rect x="446" y="198" width="28" height="28" rx="3"/>
    <rect x="480" y="198" width="28" height="28" rx="3"/><rect x="514" y="198" width="28" height="28" rx="3"/>
    <rect x="548" y="198" width="28" height="28" rx="3"/>
  </g>
  <g fill="#2546F0" opacity="0.12">
    <rect x="242" y="158" width="28" height="28" rx="3"/>
    <rect x="412" y="158" width="28" height="28" rx="3"/>
    <rect x="514" y="158" width="28" height="28" rx="3"/>
    <rect x="276" y="198" width="28" height="28" rx="3"/>
    <rect x="480" y="198" width="28" height="28" rx="3"/>
  </g>

  <!-- Center NVLink fabric -->
  <rect x="220" y="238" width="360" height="60" rx="6" fill="#091220" stroke="url(#accent)" stroke-width="1.5"/>
  <rect x="220" y="238" width="360" height="60" rx="6" fill="url(#core-heat)"/>
  <text x="400" y="263" font-family="monospace" font-size="9" fill="#22D3EE" text-anchor="middle" font-weight="bold">NVLink 5.0 Fabric</text>
  <text x="400" y="278" font-family="monospace" font-size="8" fill="#6B7A99" text-anchor="middle">1.8 TB/s · Micro-Transformer Engine</text>
  <!-- Fabric glow -->
  <rect x="220" y="238" width="360" height="60" rx="6" fill="#22D3EE" opacity="0.03" filter="url(#blur)"/>

  <!-- Bottom SM rows -->
  <g fill="#0F1A2C" stroke="#1A2848" stroke-width="0.8">
    <rect x="208" y="314" width="28" height="28" rx="3"/><rect x="242" y="314" width="28" height="28" rx="3"/>
    <rect x="276" y="314" width="28" height="28" rx="3"/><rect x="310" y="314" width="28" height="28" rx="3"/>
    <rect x="344" y="314" width="28" height="28" rx="3"/><rect x="378" y="314" width="28" height="28" rx="3"/>
    <rect x="412" y="314" width="28" height="28" rx="3"/><rect x="446" y="314" width="28" height="28" rx="3"/>
    <rect x="480" y="314" width="28" height="28" rx="3"/><rect x="514" y="314" width="28" height="28" rx="3"/>
    <rect x="548" y="314" width="28" height="28" rx="3"/>
    <rect x="208" y="354" width="28" height="28" rx="3"/><rect x="242" y="354" width="28" height="28" rx="3"/>
    <rect x="276" y="354" width="28" height="28" rx="3"/><rect x="310" y="354" width="28" height="28" rx="3"/>
    <rect x="344" y="354" width="28" height="28" rx="3"/><rect x="378" y="354" width="28" height="28" rx="3"/>
    <rect x="412" y="354" width="28" height="28" rx="3"/><rect x="446" y="354" width="28" height="28" rx="3"/>
    <rect x="480" y="354" width="28" height="28" rx="3"/><rect x="514" y="354" width="28" height="28" rx="3"/>
    <rect x="548" y="354" width="28" height="28" rx="3"/>
  </g>
  <g fill="#22D3EE" opacity="0.12">
    <rect x="344" y="314" width="28" height="28" rx="3"/>
    <rect x="514" y="314" width="28" height="28" rx="3"/>
    <rect x="208" y="354" width="28" height="28" rx="3"/>
    <rect x="446" y="354" width="28" height="28" rx="3"/>
  </g>

  <!-- Spec badge -->
  <rect x="32" y="440" width="200" height="42" rx="8" fill="#080C18" stroke="url(#accent)" stroke-width="1"/>
  <text x="132" y="458" font-family="sans-serif" font-size="11" fill="#22D3EE" text-anchor="middle" font-weight="bold">NVIDIA GB300 · Blackwell Ultra</text>
  <text x="132" y="472" font-family="monospace" font-size="8.5" fill="#6B7A99" text-anchor="middle">$45,000/module · 2.5× training throughput</text>

  <!-- Floating particles -->
  <g fill="#22D3EE" opacity="0.25">
    <circle cx="50" cy="100" r="2"/><circle cx="750" cy="100" r="2"/>
    <circle cx="50" cy="400" r="2"/><circle cx="750" cy="400" r="2"/>
  </g>
</svg>
